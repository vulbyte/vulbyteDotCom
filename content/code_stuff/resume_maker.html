<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Density Resume Builder</title>
    <style>
        :root {
            --sidebar-bg: #1a1a1a;
            --card-bg: #262626;
            --input-bg: #000;
            --text-main: #e0e0e0;
            --accent: #3a86ff;
            --danger: #ff4d4d;
            --border: #333;
        }

        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', sans-serif; background: #3c3f41; color: var(--text-main); overflow: hidden; }

        /* --- SIDEBAR UI --- */
        #sidebar { width: 330px; background: var(--sidebar-bg); border-right: 1px solid #000; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 12px; background: #111; border-bottom: 1px solid var(--border); }
        .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
        
        button, select { background: #444; color: white; border: 1px solid var(--border); padding: 4px; font-size: 11px; cursor: pointer; border-radius: 2px; }
        button:hover { background: var(--accent); }
        .btn-del { background: transparent; color: #666; border: none; font-size: 14px; cursor: pointer; }
        .btn-del:hover { color: var(--danger); }

        #element-list { flex-grow: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
        .config-card { background: var(--card-bg); border: 1px solid var(--border); padding: 6px; cursor: grab; position: relative; }
        .config-card.dragging { opacity: 0.4; border: 1px dashed var(--accent); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 9px; text-transform: uppercase; font-weight: bold; color: #888; margin-bottom: 4px; pointer-events: none; }
        .card-header div { pointer-events: auto; } /* Let buttons be clickable */
        
        .input-group { display: flex; flex-direction: column; gap: 3px; }
        input, textarea { background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 3px 5px; font-size: 11px; outline: none; width: 100%; }
        textarea { resize: vertical; min-height: 45px; }

        /* --- PREVIEW UI --- */
        #preview-pane { flex-grow: 1; overflow-y: auto; display: block; text-align: center; padding-bottom: 100px; }
        
        .paper { 
            display: inline-block;
            text-align: left;
            width: 8.5in; 
            min-height: 11in; 
            height: auto; 
            background: white; 
            margin: 40px auto; 
            padding: 0.75in; 
            color: #333; 
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        /* --- RESUME CONTENT --- */
        .res-header-block { text-align: center; margin-bottom: 18px; }
        .res-name { color: #000; font-size: 24pt; font-weight: bold; line-height: 1; margin: 0; }
        .res-contact { color: #333; font-size: 9.5pt; margin-top: 6px; }
        .res-divider { border: 0; border-top: 2.5px solid #000; margin: 15px 0; opacity: 1; }
        .res-item { margin-bottom: 14px; page-break-inside: avoid; }
        .res-section-head { margin-bottom: 4px; border-bottom: 1px solid #eee; }
        .res-title { font-size: 11.5pt; font-weight: bold; text-transform: uppercase; color: #333; display: block; }
        .res-meta { font-size: 9pt; font-style: italic; color: #666; display: block; margin-top: 1px; }
        .res-content { font-size: 10pt; white-space: pre-wrap; line-height: 1.4; color: #333; }
        .res-ref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 8px; align-items: start; }
        .ref-box { font-size: 9pt; border-left: 2px solid #eee; padding-left: 8px; color: #333; page-break-inside: avoid; margin-bottom: 8px; }
        .ref-name { font-weight: bold; color: #333; margin-bottom: 1px; display: block; }

        /* --- PRINT CONFIG --- */
        @page { size: letter; margin: 0 !important; }

        @media print {
            body { background: white !important; overflow: visible !important; }
            #sidebar { display: none !important; }
            #preview-pane { overflow: visible !important; display: block !important; margin: 0 !important; padding: 0 !important; }
            .paper { 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 8.5in !important; 
                padding: 0.65in 0.75in !important; 
                display: block !important;
            }
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-header">
        <div style="font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 10px;">RESUME CONFIGURATOR</div>
        <select id="type-selector" style="width: 100%; margin-top: 5px;">
            <option value="header">Header Block</option>
            <option value="section">Experience / Education</option>
            <option value="reference">Reference</option>
            <option value="divider">Horizontal Divider</option>
        </select>
        <div class="toolbar">
            <button onclick="addItem()">+ Add Item</button>
            <button onclick="document.getElementById('import-file').click()">Load JSON</button>
            <button onclick="downloadJSON()">Export JSON</button>
            <button onclick="window.print()" style="background: var(--accent);">Print PDF</button>
        </div>
        <input type="file" id="import-file" style="display:none" accept=".json" onchange="importJSON(event)">
    </div>
    <div id="element-list"></div>
</aside>

<main id="preview-pane">
    <div class="paper" id="paper-content"></div>
</main>

<script>
    let resumeData = [
        { "id": "1", "type": "header", "fields": { "name": "REINE YURKOWSKI", "contact": "Victoria, BC V8V 1T5 | +1 250 216 2556 | reineyurkowski@gmail.com" }, "whitelisted": true, "visible": true },
        { "id": "d1", "type": "divider", "fields": {}, "whitelisted": true, "visible": true },
        { "id": "4", "type": "section", "fields": { "title": "Roofing Supervisor & Foreman", "meta": "All-Pro Roofing | May 2020 – Feb 2026", "content": "• Maintaining and managing crews, customer relations, and various managerial tasks.\n• Handling roofing-related duties and ensuring WorkSafeBC standards are met." }, "whitelisted": true, "visible": true },
        { "id": "5", "type": "section", "fields": { "title": "Yard Technician & JOSH Member", "meta": "Cermaq Canada | Feb 2020 – Aug 2020", "content": "• Operated Class 4 forklift; handled hazardous materials and shipping/receiving.\n• Maintained health and safety standards as an active JOSH member." }, "whitelisted": true, "visible": true },
        { "id": "10", "type": "section", "fields": { "title": "Education", "meta": "College of New Caledonia | Apr 2022 – Apr 2023", "content": "Web and Graphic Design (College Certificate). Focus on HTML, CSS, JS, React, Art History, and Typography." }, "whitelisted": true, "visible": true },
        { "id": "r1", "type": "reference", "fields": { "name": "Rob Leaty", "title": "Land Lord", "phone": "1-(604)-836-0652", "email": "" }, "whitelisted": true, "visible": true },
        { "id": "r3", "type": "reference", "fields": { "name": "Graham Pearce", "title": "Instructor, UT English at CNC", "phone": "", "email": "pearceg@cnc.bc.ca" }, "whitelisted": true, "visible": true }
    ];

    const listContainer = document.getElementById('element-list');
    const paper = document.getElementById('paper-content');

    // 1. Core Logic
    function render() {
        renderSidebar();
        renderPaper();
    }

    function addItem() {
        const type = document.getElementById('type-selector').value;
        const schemas = { header: { name: '', contact: '' }, section: { title: '', meta: '', content: '' }, reference: { name: '', title: '', phone: '', email: '' }, divider: {} };
        resumeData.push({ id: Date.now().toString(), type, fields: schemas[type], whitelisted: true, visible: true });
        render();
    }

    function removeItem(id) {
        resumeData = resumeData.filter(d => d.id !== id);
        render();
    }

    function updateField(id, key, value) {
        const item = resumeData.find(d => d.id === id);
        if (item) {
            item.fields[key] = value;
            renderPaper();
        }
    }

    function toggleVisible(id) {
        const item = resumeData.find(d => d.id === id);
        if (item) {
            item.visible = !item.visible;
            render();
        }
    }

    // 2. Sidebar Rendering with Drag & Drop
    function renderSidebar() {
        listContainer.innerHTML = '';
        resumeData.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'config-card';
            card.draggable = true;
            card.dataset.id = item.id;

            let inputs = Object.entries(item.fields).map(([k, v]) => 
                k === 'content' 
                ? `<textarea oninput="updateField('${item.id}', '${k}', this.value)">${v}</textarea>` 
                : `<input type="text" value="${v}" oninput="updateField('${item.id}', '${k}', this.value)">`
            ).join('');

            card.innerHTML = `
                <div class="card-header">
                    <span>${item.type}</span>
                    <div>
                        <input type="checkbox" ${item.visible ? 'checked' : ''} onchange="toggleVisible('${item.id}')">
                        <button class="btn-del" onclick="removeItem('${item.id}')">×</button>
                    </div>
                </div>
                <div class="input-group">${inputs || 'Divider Line'}</div>
            `;

            // Drag Events
            card.addEventListener('dragstart', () => card.classList.add('dragging'));
            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                syncOrder();
            });

            listContainer.appendChild(card);
        });
    }

    // 3. Reordering Logic
    listContainer.addEventListener('dragover', e => {
        e.preventDefault();
        const dragging = document.querySelector('.dragging');
        if (!dragging) return;
        
        const afterElement = getDragAfterElement(listContainer, e.clientY);
        if (afterElement == null) {
            listContainer.appendChild(dragging);
        } else {
            listContainer.insertBefore(dragging, afterElement);
        }
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.config-card:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function syncOrder() {
        const ids = [...listContainer.querySelectorAll('.config-card')].map(el => el.dataset.id);
        resumeData = ids.map(id => resumeData.find(d => d.id === id));
        renderPaper();
    }

    // 4. Paper Rendering
    function renderPaper() {
        paper.innerHTML = '';
        let htmlBuffer = "";
        let inRefGrid = false;
        
        resumeData.filter(item => item.whitelisted && item.visible).forEach((item) => {
            if (item.type === 'reference') {
                if (!inRefGrid) { htmlBuffer += `<div class="res-ref-grid">`; inRefGrid = true; }
                htmlBuffer += `<div class="ref-box"><span class="ref-name">${item.fields.name || ''}</span><div>${item.fields.title || ''}</div><div>${item.fields.phone || ''} ${item.fields.email || ''}</div></div>`;
            } else {
                if (inRefGrid) { htmlBuffer += `</div>`; inRefGrid = false; }
                if (item.type === 'header') {
                    htmlBuffer += `<div class="res-header-block"><h1 class="res-name">${item.fields.name || ''}</h1><div class="res-contact">${item.fields.contact || ''}</div></div>`;
                } else if (item.type === 'section') {
                    htmlBuffer += `<div class="res-item"><div class="res-section-head"><span class="res-title">${item.fields.title || ''}</span><span class="res-meta">${item.fields.meta || ''}</span></div><div class="res-content">${item.fields.content || ''}</div></div>`;
                } else if (item.type === 'divider') {
                    htmlBuffer += `<hr class="res-divider">`;
                }
            }
        });
        if (inRefGrid) htmlBuffer += `</div>`;
        paper.innerHTML = htmlBuffer;
    }

    // 5. Data persistence
    function downloadJSON() {
        const blob = new Blob([JSON.stringify(resumeData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'resume.json'; a.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) { resumeData = imported; render(); }
            } catch (err) { alert("Invalid JSON"); }
        };
        reader.readAsText(file);
    }

    render();
</script>
</body>
</html>
