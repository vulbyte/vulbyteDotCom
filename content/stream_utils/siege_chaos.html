<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R6 Siege Ultimate Roulette</title>
		<script src="/client_management.js" type="module"></script>
<style>
    :root {
        --bg: #0b0e14;
        --card: #1a1f29;
        --accent-atk: #cc3d3d;
        --accent-def: #3d7acc;
        --gold: #f4b400;
        --text: #ffffff;
        --dim-text: #a0a0a0;
    }

    /* Reset body so it doesn't interfere with Header/Footer */
    body {
        font-family: 'Bahnschrift', 'Segoe UI', sans-serif;
        color: var(--text);
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* New Wrapper to center the Roulette ONLY */
    .roulette-container {
        flex: 1; /* Pushes header up and footer down */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
				padding-top: 10rem;
    }

    #roulette {
        width: 380px;
        background: var(--card);
        border: 2px solid #333;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    /* Keep your existing .side-toggle, .card, .att-item, etc. styles here */
    .side-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
    .side-btn {
        flex: 1; padding: 10px; border: none; cursor: pointer;
        font-weight: 900; border-radius: 4px; background: #2a2f3a; color: #666;
        transition: 0.2s ease;
    }
    .active-atk { background: var(--accent-atk) !important; color: white !important; }
    .active-def { background: var(--accent-def) !important; color: white !important; }
    .op-box { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px; }
    .op-icon { width: 90px; height: 90px; }
    .op-name { font-size: 2rem; font-weight: 900; text-transform: uppercase; }
    .card { background: rgba(0,0,0,0.3); border-radius: 6px; padding: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
    .label { font-size: 0.7rem; color: var(--gold); font-weight: bold; text-transform: uppercase; }
    .name-tag { font-size: 1.1rem; font-weight: bold; display: block; }
    .attachment-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .att-item { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .att-icon { width: 28px; height: 28px; filter: brightness(0) invert(1); }
    .att-name { font-size: 0.6rem; color: var(--dim-text); }
    #roll-btn {
        width: 100%; padding: 16px; border: none; border-radius: 6px;
        background: var(--gold); color: #000; font-weight: 900;
        font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
    }
</style>

<body>
	<h1>siege randomizer baybee wooooooooooo!</h1>
    <div class="roulette-container">
        <div id="roulette">
            <div class="side-toggle">
                <button id="btn-atk" class="side-btn active-atk" onclick="setSide('atk')">ATTACK</button>
                <button id="btn-def" class="side-btn" onclick="setSide('def')">DEFENSE</button>
            </div>

            <div class="op-box">
                <img id="op-img" class="op-icon" src="https://r6operators.marcopixel.eu/icons/png/recruit_blue.png">
                <div id="op-name" class="op-name">READY?</div>
            </div>

            <div class="card">
                <div class="label">Primary Weapon</div>
                <span id="p-weapon" class="name-tag">---</span>
                <div id="p-atts" class="attachment-row"></div>
            </div>

            <div class="card">
                <div class="label">Secondary Weapon</div>
                <span id="s-weapon" class="name-tag">---</span>
                <div id="s-atts" class="attachment-row"></div>
            </div>

            <div class="card" style="border-left-color: #fff;">

                    <img id="gadget-img" style="width: 35px; filter: invert(1);" src="">
                    <span id="gadget-name" class="name-tag" style="margin:0;">---</span>
                </div>
            </div>

            <button id="roll-btn" onclick="roll()">GENERATE LOADOUT</button>

    </div>

"Sight": "https://img.icons8.com/ios-glyphs/60/ffffff/visible--v1.png",

            "Muzzle": "https://img.icons8.com/ios-filled/50/ffffff/bullet.png",
            "Grip": "https://img.icons8.com/ios-filled/50/ffffff/hand.png",
            "Laser": "https://img.icons8.com/ios-filled/50/ffffff/flash-on.png"
        };
        return icons[type] || "https://img.icons8.com/ios-filled/50/ffffff/settings.png";
    };

    // 3. UI CONTROLLER FUNCTIONS
    function setSide(side) {
        currentSide = side;
        document.getElementById('btn-atk').className = side === 'atk' ? 'side-btn active-atk' : 'side-btn';
        document.getElementById('btn-def').className = side === 'def' ? 'side-btn active-def' : 'side-btn';

    }

    function roll() {
        const pool = operators[currentSide];
        const op = pool[Math.floor(Math.random() * pool.length)];
        
        // Update Op Text
        document.getElementById('op-name').innerText = op.name;

        // FIXED ICON LOGIC: Remove spaces and force lowercase for the API
        const cleanNameForUrl = op.name.toLowerCase().replace(/\s+/g, '');
        document.getElementById('op-img').src = `https://r6operators.marcopixel.eu/icons/png/${cleanNameForUrl}.png`;

        // Update Weapons
        document.getElementById('p-weapon').innerText = op.weapons[Math.floor(Math.random() * op.weapons.length)];
        document.getElementById('s-weapon').innerText = op.secondaries[Math.floor(Math.random() * op.secondaries.length)];

        // Update Gadget
        const gad = op.gadgets[Math.floor(Math.random() * op.gadgets.length)];
        document.getElementById('gadget-name').innerText = gad;
        document.getElementById('gadget-img').src = "https://img.icons8.com/ios-filled/50/ffffff/briefcase.png";

        // Generate Attachment UI for both slots

            const container = document.getElementById(divId);
            container.innerHTML = '';

                const iconSrc = getAttIcon(a.type);
                item.innerHTML = `<img class="att-icon" src="${iconSrc}"><span class="att-name">${a.val}</span>`;
                container.appendChild(item);
            });
        });
